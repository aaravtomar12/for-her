<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      text-align: center;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      font-family: 'Poppins', sans-serif;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 50px;
      color: #ff4d6d;
      margin-top: 120px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #ff4d6d;
      color: white;
      margin-top: 30px;
    }

    .heart {
      position: absolute;
      color: pink;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>Zalak… I have something to tell you 💭</h1>

<button onclick="next()">Tap here 🥺</button>

<script>
function next() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      I didn’t plan this…
    </h1>
    <button onclick="next2()">Next 👉</button>
  `;
}

function next2() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      but you’ve become really special to me 💖
    </h1>
    <button onclick="next3()">Next 👉</button>
  `;
}

function next3() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      and I think…
    </h1>
    <button onclick="final()">Tap 🥺</button>
  `;
}

function final() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      Zalak, I really like you ❤️
    </h1>
  `;
  hearts();
}

function hearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = "20px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 300);
}
</script>

</body>
</html>
