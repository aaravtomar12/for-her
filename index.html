<!DOCTYPE html>
<html>
<head>
  <title>💖</title>

  <!-- Aesthetic Cute Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      font-family: 'Poppins', sans-serif;
      margin-top: 100px;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      overflow: hidden;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 55px;
      color: #ff4d6d;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      position: absolute;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    #yes {
      left: 40%;
      top: 60%;
      background: #ff4d6d;
      color: white;
    }

    #no {
      left: 55%;
      top: 60%;
      background: white;
    }
  </style>
</head>

<body>

<h1>Do you love me, Vanshika? 💖🥺</h1>

<button id="yes" onclick="yesClicked()">Yes 💕</button>
<button id="no" onmouseover="moveNo()">No 😢</button>

<script>
function moveNo() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

function yesClicked() {
  document.body.innerHTML = `
    <h1 style="font-family: 'Great Vibes', cursive; color:#ff4d6d;">
      YAYYYYY 💖🥰
    </h1>
    <h2 style="font-family: 'Poppins', sans-serif;">
      I knew you loved me 😏💕
    </h2>
  `;
}
</script>

</body>
</html>
