<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      text-align: center;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      font-family: 'Poppins', sans-serif;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 55px;
      color: #ff4d6d;
      margin-top: 120px;
    }

    #type {
      border-right: 2px solid #ff4d6d;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      background: #ff4d6d;
      color: white;
      margin-top: 30px;
      position: absolute;
      font-family: 'Poppins', sans-serif;
    }

    #centerBtn {
      position: static;
    }

    #yes {
      left: 40%;
      top: 60%;
    }

    #no {
      left: 55%;
      top: 60%;
      background: white;
      color: black;
    }

    .heart {
      position: absolute;
      color: pink;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1 id="type"></h1>
<button id="centerBtn" onclick="next()">Tap here 🥺</button>

<script>
let text = "Zalak… I have something to tell you 💭";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("type").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 60);
  }
}

typeEffect();

function next() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      I didn’t plan this…
    </h1>
    <button id="centerBtn" onclick="next2()">Next 👉</button>
  `;
}

function next2() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      but you’ve become really special to me 💖
    </h1>
    <button id="centerBtn" onclick="next3()">Next 👉</button>
  `;
}

function next3() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      and I think…
    </h1>
    <button id="centerBtn" onclick="finalStep()">Tap 🥺</button>
  `;
}

function finalStep() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      Zalak, do you like me? 💖🥺
    </h1>

    <button id="yes" onclick="yesClicked()">Yes 💕</button>
    <button id="no" onmouseover="moveNo()">No 😢</button>
  `;
}

function moveNo() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  let noBtn = document.getElementById("no");
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function yesClicked() {
  document.body.innerHTML = `
    <h1 style="font-family:'Great Vibes'; color:#ff4d6d; margin-top:120px;">
      I knew it 😏💖
    </h1>
  `;
  hearts();
}

function hearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = "20px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 300);
}
</script>

</body>
</html>
