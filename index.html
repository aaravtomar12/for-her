<!DOCTYPE html>
<html>
<head>
  <title>💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      font-family: 'Pacifico', cursive;
      margin-top: 50px;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      overflow: hidden;
    }

    img {
      width: 220px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 45px;
      color: #ff4d6d;
    }

    button {
      padding: 12px 25px;
      font-size: 20px;
      position: absolute;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-family: 'Pacifico', cursive;
    }

    #yes {
      left: 40%;
      top: 65%;
      background: #ff4d6d;
      color: white;
    }

    #no {
      left: 55%;
      top: 65%;
      background: white;
    }
  </style>
</head>

<body>

<!-- Cute Image -->
<img src="https://cdn.pixabay.com/photo/2021/01/31/17/53/rabbit-5966118_1280.png">

<h1>Do you love me, Vanshika? 💖🥺</h1>

<button id="yes" onclick="yesClicked()">Yes 💕</button>
<button id="no" onmouseover="moveNo()">No 😢</button>

<script>
function moveNo() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

function yesClicked() {
  document.body.innerHTML = `
    <h1 style="color:#ff4d6d;">YAYYYYY 💖🥰</h1>
    <h2>I knew you loved me 😏💕</h2>
  `;
}
</script>

</body>
</html>
